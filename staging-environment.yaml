apiVersion: v1
kind: Namespace
metadata:
  name: staging
---
apiVersion: v1
kind: Pod
metadata:
  name: backend-pod
  namespace: staging
  labels:
    app: backend
    env: staging
spec:
  containers:
    - name: backend-container
      image: backend-app:latest
      imagePullPolicy: Never
      ports:
        - containerPort: 8080
      env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: staging
spec:
  type: ClusterIP
  selector:
    app: backend
    env: staging
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Pod
metadata:
  name: frontend-pod
  namespace: staging
  labels:
    app: frontend
    env: staging
spec:
  containers:
    - name: frontend-container
      image: frontend-app:latest
      imagePullPolicy: Never
      ports:
        - containerPort: 80