<!DOCTYPE html>
<html>
<head>
    <title>Frontend Application</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 10px;
        }
        .info {
            background-color: #e8f5e8;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
        #response {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            min-height: 50px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Frontend Application</h1>
        
        <div class="info">
            <p><strong>Pod Name:</strong> <span id="pod-name">Loading...</span></p>
            <p><strong>Namespace:</strong> <span id="namespace">Loading...</span></p>
        </div>
        
        <h3>Test Backend Connection:</h3>
        <button onclick="callBackend('/api')">Call Backend Root</button>
        <button onclick="callBackend('/api/info')">Get Backend Info</button>
        <button onclick="callBackend('/api/health')">Check Health</button>
        
        <div id="response">
            Response will appear here...
        </div>
    </div>

    <script>
        // Get pod information from environment
        fetch('/api/info')
            .then(response => response.json())
            .then(data => {
                document.getElementById('pod-name').textContent = data.pod || 'unknown';
                document.getElementById('namespace').textContent = data.namespace || 'unknown';
            })
            .catch(error => {
                document.getElementById('pod-name').textContent = 'Error loading';
                document.getElementById('namespace').textContent = 'Error loading';
            });

        function callBackend(endpoint) {
            document.getElementById('response').innerHTML = 'Loading...';
            
            fetch(endpoint)
                .then(response => response.text())
                .then(data => {
                    document.getElementById('response').innerHTML = 
                        `<strong>Response from ${endpoint}:</strong><br><pre>${data}</pre>`;
                })
                .catch(error => {
                    document.getElementById('response').innerHTML = 
                        `<strong>Error:</strong> ${error.message}`;
                });
        }
    </script>
</body>
</html>
